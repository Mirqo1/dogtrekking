<!DOCTYPE html>
<html>
  <head>
    <script>
      var path = window.location.pathname;
      // Na GitHub Pages projektovej stránke je koreň webu /<nazov-repa>/,
      // na vlastnej doméne (dogtrekking.sk) je to /.
      var base = window.location.hostname.endsWith("github.io")
        ? "/" + path.split("/")[1] + "/"
        : "/";
      sessionStorage.redirect = path;
      location.replace(base);
    </script>
  </head>
</html>
