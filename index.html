<div id="cookie-banner" style="position:fixed; bottom:0; width:100%; background:#333; color:white; padding:15px; text-align:center; display:none; z-index:9999;">

<script>
    function acceptCookies() {
        localStorage.setItem('cookieConsent', 'true');
